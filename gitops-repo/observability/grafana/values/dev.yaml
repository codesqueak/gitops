# Dev credentials - replace with SSO in production
adminPassword: admin

# Without this, admin password changes and any UI-created state (dashboards,
# alert rules, etc.) don't survive a pod restart/recreation - the chart
# defaults to no persistent storage.
persistence:
  enabled: true
  type: pvc
  accessModes:
    - ReadWriteOnce
  size: 1Gi

# The pod's default securityContext.fsGroup: 472 already gives the grafana
# user group ownership of the volume at mount time. initChownData's
# recursive chown is redundant on top of that, and breaks once Grafana has
# created its own 0700 png/csv/pdf dirs on the volume - its capability set
# (CHOWN only, no DAC_OVERRIDE) can't traverse into them on a re-chown.
initChownData:
  enabled: false

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - grafana.local

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        uid: mimir
        url: http://mimir-gateway.observability.svc.cluster.local/prometheus
        isDefault: true
        jsonData:
          httpMethod: POST
          # Grafana assumes a 15s scrape interval when this is unset, and uses
          # it to compute $__rate_interval (max($__interval + this, 4 * this))
          # for every rate()/irate() panel query. Alloy's actual scrape_interval
          # default is 60s (confirmed empirically - node_cpu_seconds_total only
          # changes value every 60s), so the unset default made Grafana compute
          # a 1-minute rate window - exactly equal to the real scrape gap, so
          # most evaluation points caught 0-1 raw samples instead of the 2
          # rate() needs, silently emptying every rate()-based panel (Node
          # Exporter Full's CPU/Network Basic panels going blank while
          # non-rate() gauge panels like Memory/Disk Basic kept working was the
          # symptom that surfaced this, 2026-07-13). Set to match Alloy's real
          # cadence; if Alloy's scrape_interval is ever changed, update this too.
          timeInterval: 60s

      - name: Loki
        type: loki
        uid: loki
        url: http://loki-gateway.observability.svc.cluster.local
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: '"traceId":"(\w+)"'
              url: "$${__value.raw}"
              datasourceUid: tempo

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo-query-frontend.observability.svc.cluster.local:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
          serviceMap:
            datasourceUid: mimir
          nodeGraph:
            enabled: true
          lokiSearch:
            datasourceUid: loki

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

# Pre-built community dashboards, pulled from grafana.com on pod start.
# `datasource` is matched by name against the `datasources` block above.
dashboards:
  default:
    node-exporter-full:
      gnetId: 1860
      revision: 45
      datasource: Mimir
    # Forked from gnetId 15757 (revision 43): every panel filters on the
    # dashboard's own `$job` template variable using equality (`job="$job"`),
    # but `$job` is declared `multi: true` - Grafana always regex-escapes
    # multi-enabled variables on interpolation, even with a single value
    # selected, on the assumption they're used with `=~`. Alloy's default job
    # label for a `prometheus.scrape "node_exporter"` block is the dotted
    # component path (`prometheus.scrape.node_exporter`), and the escaper
    # turns those dots into `\.` for regex-safety - which then never equals
    # the real (unescaped) label value under `=`. Every node-exporter-sourced
    # panel (CPU/Memory Utilization - cluster/by instance, network, global
    # gauges) went blank as a result; cAdvisor-sourced panels (by namespace)
    # were unaffected since they don't filter on `$job` at all. This wouldn't
    # reproduce against stock kube-prometheus-stack, whose node-exporter job
    # is plainly "node-exporter" (no regex metacharacters, so the escaping is
    # a no-op) - it's specific to Alloy's naming convention, but since job
    # names are free text, no naming choice is guaranteed safe against this
    # class of bug. Fixed copy at
    # gitops-repo/observability/grafana/dashboards/kubernetes-views-global.json
    # changes every `job="$job"` to `job=~"$job"` (25 occurrences) so it's
    # correct for `$job` matching any value, single or multi. No datasource
    # substitution needed here - unlike the other forked dashboards below,
    # every panel already uses the dashboard's own `${datasource}` template
    # variable rather than a hardcoded string/UID, so it resolves to whichever
    # Prometheus-type datasource exists (Mimir) without any chart-side sed step.
    kubernetes-views-global:
      url: https://raw.githubusercontent.com/codesqueak/gitops/main/gitops-repo/observability/grafana/dashboards/kubernetes-views-global.json
    # Forked from gnetId 4701 (revision 10): built assuming the classic
    # micrometer-registry-prometheus + /actuator/prometheus scrape path, whose
    # Prometheus naming convention pluralizes unit suffixes (jvm_threads_live_threads,
    # jvm_classes_loaded_classes) and always uses seconds. Our Spring Boot services
    # use spring-boot-starter-opentelemetry's OtlpMeterRegistry instead, pushed
    # through Alloy's OTLP receiver -> otelcol.exporter.prometheus converter, which
    # follows OTel's own naming/unit conventions (jvm_threads_live, jvm_classes_loaded,
    # jvm_gc_pause_milliseconds_* instead of jvm_gc_pause_seconds_*). Fixed copy at
    # gitops-repo/observability/grafana/dashboards/jvm-micrometer.json renames every
    # affected query to the OTel-derived metric name and rescales ms-based values
    # back to seconds to match each panel's existing unit formatting. The GC "max
    # pause" panel has no direct equivalent (OTel exports a histogram, not a
    # summary with _max) - approximated via histogram_quantile(1.0, ...).
    jvm-micrometer:
      url: https://raw.githubusercontent.com/codesqueak/gitops/main/gitops-repo/observability/grafana/dashboards/jvm-micrometer.json
      datasource:
        - name: DS_PROMETHEUS
          value: mimir
    logs-app:
      gnetId: 13639
      revision: 2
      datasource: Loki
    # Forked from gnetId 24685 (revision 1): every panel hardcodes the
    # original author's datasource UID (PAE45454D0EDB9216) via the newer
    # multi-line `"datasource": {"type":..., "uid":...}` object form, which
    # the chart's single-line sed substitution (the plain `datasource: Mimir`
    # string form used above) can't rewrite - it requires the whole field on
    # one line. Fixed copy lives at
    # gitops-repo/observability/grafana/dashboards/alloy-k8s-microservices.json
    # with every uid replaced by the token ${MIMIR_UID}, substituted below via
    # the chart's slice-form datasource mechanism instead - this one works
    # line-position-independent, so it survives redeployment to any
    # environment as long as `value` here matches that env's Mimir uid.
    alloy-k8s-microservices:
      url: https://raw.githubusercontent.com/codesqueak/gitops/main/gitops-repo/observability/grafana/dashboards/alloy-k8s-microservices.json
      datasource:
        - name: MIMIR_UID
          value: mimir
